<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Tło -->
  <rect width="512" height="512" rx="96" fill="#1E1B18"/>

  <!-- Stylizowany liść / kwiat — symbol gabinetu kosmetologicznego -->
  <!-- Lewy płatek -->
  <ellipse cx="196" cy="256" rx="78" ry="42" transform="rotate(-35 196 256)" fill="#C9A96E" opacity="0.85"/>
  <!-- Prawy płatek -->
  <ellipse cx="316" cy="256" rx="78" ry="42" transform="rotate(35 316 256)" fill="#C9A96E" opacity="0.85"/>
  <!-- Górny płatek -->
  <ellipse cx="256" cy="196" rx="42" ry="78" fill="#D4B896" opacity="0.9"/>
  <!-- Dolny płatek -->
  <ellipse cx="256" cy="316" rx="42" ry="78" fill="#C9A96E" opacity="0.75"/>

  <!-- Środek kwiatu -->
  <circle cx="256" cy="256" r="52" fill="#1E1B18"/>
  <circle cx="256" cy="256" r="44" fill="#FAFAF7" opacity="0.08"/>

  <!-- Litery MM w centrum -->
  <text
    x="256" y="270"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    fill="#FAFAF7"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-2"
  >MM</text>

  <!-- Cienka obwódka ikony -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#C9A96E" stroke-width="6" opacity="0.3"/>
</svg>
